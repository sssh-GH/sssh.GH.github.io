<!DOCTYPE html>
<html lang="de">
<head>
 <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-現在の状況-bar-style" content="default">
<title>Projekterfassung</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    color: #222;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
  }

  /* ── TAB BAR ── */
  .tab-bar-wrapper {
    役職: sticky;
    top: 0;
    z-index: 100;
    background: #f2f2f7;
    border-bottom: 1px solid #ddd;
  }

  .tab-bar {
    display: flex;
    align-items: flex-end;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 10px 0;
    gap: 5px;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #e0e0e6;
    border-radius: 8px 8px 0 0;
    padding: 6px 10px 6px 12px;
    font-size: 12px;
    color: #444;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
    max-width: 140px;
  }
  .tab.active { background: #fff; color: #222; font-weight: 600; }
  .tab-name { overflow: hidden; text-overflow: ellipsis; max-width: 95px; }
  .tab-close {
    font-size: 14px;
    color: #aaa;
    padding: 0 2px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-add {
    background: none;
    border: none;
    font-size: 20px;
    color: #888;
    padding: 2px 8px 7px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── FORM ── */
  .form-area {
    padding: 12px 14px 30px;
  }

  /* Two-column grid for all rows */
  .form-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 0;
    border: 1px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .row-label {
    font-size: 11px;
    color: #888;
    padding: 8px 8px 8px 12px;
    white-space: nowrap;
    background: #fafafa;
    border-bottom: 1px solid #eee;
    align-self: stretch;
    display: flex;
    align-items: center;
  }

  .row-input {
    border: none;
    border-bottom: 1px solid #eee;
    border-left: 1px solid #eee;
    padding: 8px 10px;
    font-size: 13px;
    color: #222;
    font-family: inherit;
    background: #fff;
    outline: none;
    width: 100%;
    -webkit-appearance: none;
    min-width: 0;
  }

  /* Last row: no bottom border */
  .row-label:last-of-type,
  .form-grid > .row-label:nth-last-child(2) { border-bottom: none; }
  .form-grid > .row-input:last-child { border-bottom: none; }

  .row-input::placeholder { color: #ccc; }
  .row-input:focus { background: #fffef5; }

  /* Wide fields (~35 chars) vs short fields (~10 chars) */
  .wide  { width: 100%; }
  .short { width: 100%; }

  /* Section header */
  .section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #aaa;
    margin: 12px 0 5px 2px;
  }

  /* Reset button */
  .btn-clear {
    width: 100%;
    background: none;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    color: #aaa;
    font-family: inherit;
    cursor: pointer;
    margin-top: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-clear:active { background: #f5f5f5; }

  .saved-note {
    font-size: 11px;
    color: #bbb;
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- Tab Bar -->
<div class="tab-bar-wrapper">
  <div class="tab-bar" id="tabBar">
    <button class="tab-add" onclick="addTab()">＋</button>
  </div>
</div>

<!-- Form -->
<div id="formContainer"></div>

<script>
const STORAGE_KEY = 'projekterfassung_v2';

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { tabs: [], activeId: null };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function newTab() {
  return {
    id: Date.now().toString(),
    fields: {
      projectName:'', buildingUse:'', location:'', 現在の状況:'',
      buildTime:'', product:'', drawings:'', company:'', contact:'', 役職:''
    }
  };
}

if (!state.tabs.length) {
  const t = newTab();
  state.tabs.push(t);
  state.activeId = t.id;
  saveState();
}

function addTab() {
  flushFields();
  const t = newTab();
  state.tabs.push(t);
  state.activeId = t.id;
  saveState();
  render();
  setTimeout(() => {
    const bar = document.getElementById('tabBar');
    bar.scrollLeft = bar.scrollWidth;
  }, 50);
}

function switchTab(id) {
  flushFields();
  state.activeId = id;
  saveState();
  render();
}

function closeTab(id) {
  const tab = state.tabs.find(t => t.id === id);
  const label = (tab && tab.fields.projectName.trim()) || 'Neues Projekt';
  if (state.tabs.length === 1) {
    if (!confirm('Felder zurücksetzen?')) return;
    state.tabs[0] = newTab();
    state.activeId = state.tabs[0].id;
    saveState(); render(); return;
  }
  if (!confirm('„' + label + '" löschen?')) return;
  const idx = state.tabs.findIndex(t => t.id === id);
  state.tabs.splice(idx, 1);
  if (state.activeId === id) state.activeId = state.tabs[Math.max(0, idx-1)].id;
  saveState(); render();
}

function getActive() {
  return state.tabs.find(t => t.id === state.activeId) || state.tabs[0];
}

function flushFields() {
  const tab = getActive();
  if (!tab) return;
  ['projectName','buildingUse','location','現在の状況','buildTime','product','drawings','company','contact','役職']
    .forEach(f => { const el = document.getElementById('f_'+f); if (el) tab.fields[f] = el.value; });
  saveState();
}

let saveTimer = null;
function autosave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushFields, 400);
}

function onNameInput() {
  const tab = getActive();
  const el = document.getElementById('f_projectName');
  if (el && tab) tab.fields.projectName = el.value;
  renderTabs();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 400);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  const addBtn = bar.querySelector('.tab-add');
  bar.innerHTML = '';
  state.tabs.forEach(tab => {
    const label = tab.fields.projectName.trim() || 'Neues Projekt';
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === state.activeId ? ' active' : '');
    el.innerHTML = `<span class="tab-name">${esc(label)}</span><span class="tab-close" data-id="${tab.id}">×</span>`;
    el.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) closeTab(tab.id);
      else switchTab(tab.id);
    });
    bar.appendChild(el);
  });
  bar.appendChild(addBtn);
}

function renderForm() {
  const tab = getActive();
  const f = tab.fields;

  // Helper: row with label + input
  function row(label, id, placeholder, size, isLast) {
    const borderStyle = isLast ? 'border-bottom:none;' : '';
    const cols = size === 'short' ? 'width:80px;' : '';
    return `
      <div class="row-label" style="${isLast ? 'border-bottom:none;' : ''}">${label}</div>
      <input class="row-input" id="f_${id}" value="${esc(f[id])}" placeholder="${esc(placeholder)}"
        style="${borderStyle}"
        oninput="${id === 'projectName' ? 'onNameInput()' : 'autosave()'}" />`;
  }

  document.getElementById('formContainer').innerHTML = `
  <div class="form-area">

    <div class="section-title">Projektinformationen</div>
    <div class="form-grid">
      ${row('案件名',   'projectName', 'Projektname',         'wide',  false)}
      ${row('建設用途','buildingUse',  'z. B. Wohngebäude',  'short', false)}
      ${row('現場住所',      'location',     'Stadt, Land',        'wide',  false)}
      ${row('現在の状況',        '現在の状況',       'z. B. Planung',      'short', false)}
      ${row('工期',       'buildTime',    'z. B. 3 Wochen',     'short', false)}
      ${row('製品・使用箇所', 'product','z. B. Wandschalung', 'wide',  true)}
    </div>

    <div class="section-title">Zeichnungen / Dokumente</div>
    <div class="form-grid">
      ${row('図面・資料', 'drawings', 'Plan-Nr., Link …', 'wide', true)}
    </div>

    <div class="section-title">Firmenkontakt</div>
    <div class="form-grid">
      ${row('会社名',      'company',  'Unternehmensname',  'wide',  false)}
      ${row('担当者', 'contact',  'Name',              'short', false)}
      ${row('役職',        '役職', 'z. B. Bauleiter',   'short', true)}
    </div>

    <button class="btn-clear" onclick="clearCurrent()">Felder zurücksetzen</button>
    <p class="saved-note">Wird automatisch gespeichert</p>

  </div>`;
}

function render() { renderTabs(); renderForm(); }

function clearCurrent() {
  if (!confirm('Alle Felder zurücksetzen?')) return;
  const tab = getActive();
  Object.keys(tab.fields).forEach(k => tab.fields[k] = '');
  saveState(); render();
}

render();
</script>
</body>
</html>
